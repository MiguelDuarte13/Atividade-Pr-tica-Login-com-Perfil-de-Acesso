<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Login</h1>

    <div class="formulario">

        <input
            type="text"
            id="login"
            placeholder="Login ou E-mail">

        <input
            type="password"
            id="senha"
            placeholder="Senha">

        <button id="entrar">
            Entrar
        </button>

        <p id="mensagem"></p>

    </div>

    <script src="login.js"></script>

</body>
</html>
